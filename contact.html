    <h2><strong> Contact us today for available services and sign up for monthly updates! </strong></h2>

  <form action="mailto:info@WellnessClinic" method="post" name="register" id="register">

      <label for="textfield">Last Name:</label>
      <input type="text" name="textfield" required id="lastname">

    <input type="tel" name="tel" required id="telephone">

      <label for="email">Email:</label>
      <input name="email" type="email" required id="email">

    </form>

    <select name="select" id="select">
      <option>-Select-</option>

      <option value="radio">Radio</option>

      <option value="web">Website Ad</option>
      <option value="paper">Newspaper</option>
      <option value="friend">Friend</option>
      </select>
    </p>
